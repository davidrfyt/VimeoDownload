<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimeo Downloader Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="extension-popup">
    <main class="container glass-panel">
        <header>
            <h1>Vimeo<span class="highlight">Downloader</span></h1>
        </header>

        <section class="search-section">
            <form id="url-form">
                <div class="input-group">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <input type="url" id="vimeo-url" placeholder="Pega el enlace de Vimeo aquí..." required
                        autocomplete="off">
                </div>
                <div class="input-group">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="vimeo-password" placeholder="Contraseña (opcional)" autocomplete="off">
                </div>
                <button type="submit" id="search-btn">
                    <span>Buscar Video</span>
                    <div class="loader-spinner" style="display: none;"></div>
                </button>
            </form>
            <div id="error-message" class="error-message hidden"></div>
        </section>

        <!-- Video Info Card -->
        <section id="video-info" class="video-info hidden">
            <div class="thumbnail-container">
                <img id="video-thumbnail" src="" alt="Video Thumbnail">
                <span id="video-duration" class="duration-badge">00:00</span>
            </div>
            <div class="details">
                <h3 id="video-title">Título del video</h3>
                <div class="action-buttons" style="display: flex; gap: 8px;">
                    <button id="download-btn" class="download-btn"
                        style="flex: 1; padding: 0.75rem; font-size: 0.85rem;">
                        Descargar MP4
                    </button>
                    <button id="download-mp3-btn" class="download-btn"
                        style="flex: 1; padding: 0.75rem; font-size: 0.85rem; background: linear-gradient(135deg, #10b981, #059669);">
                        Descargar MP3
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="popup.js"></script>
</body>

</html>
