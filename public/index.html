<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimeo Downloader Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icons/icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <div class="app-status-bar">
        <div class="status-indicator">
            <span class="dot pulse"></span>
            <span class="status-text">Versión <span id="app-version">1.2.0</span></span>
        </div>
    </div>
    <main class="container glass-panel">
        <header>
            <h1>Vimeo<span class="highlight">Downloader</span></h1>
            <p>Descarga tus videos favoritos en la mejor calidad</p>
        </header>

        <section class="search-section">
            <form id="url-form">
                <div class="input-group">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <input type="url" id="vimeo-url" placeholder="Pega el enlace de Vimeo aquí..." required
                        autocomplete="off">
                </div>
                <div class="input-group">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="vimeo-password" placeholder="Contraseña (opcional)" autocomplete="off">
                </div>
                <button type="submit" id="search-btn">
                    <span>Buscar Video</span>
                    <div class="loader-spinner" style="display: none;"></div>
                </button>
            </form>
            <div id="error-message" class="error-message hidden"></div>
        </section>

        <!-- Video Info Card -->
        <section id="video-info" class="video-info hidden">
            <div class="thumbnail-container">
                <img id="video-thumbnail" src="" alt="Video Thumbnail">
                <span id="video-duration" class="duration-badge">00:00</span>
            </div>
            <div class="details">
                <h3 id="video-title">Título del video</h3>
                <p>Listo para descargar</p>
                <div class="quality-selector-container">
                    <label for="quality-select">Calidad:</label>
                    <select id="quality-select" class="quality-select">
                        <option value="">Cargando calidades...</option>
                    </select>
                </div>
                <div class="action-buttons" style="display: flex; gap: 10px;">
                    <button id="download-btn" class="download-btn" style="flex: 1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Descargar MP4
                    </button>
                    <button id="download-mp3-btn" class="download-btn"
                        style="flex: 1; background: linear-gradient(135deg, #10b981, #059669); border: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        Descargar MP3
                    </button>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p>Desarrollado por <a href="https://neogalaxyx.com/" target="_blank" id="dev-link">ShiroChi</a></p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
